# Host nginx reverse proxy for Syna Co ERP (Future Account)
# Install on VPS: /etc/nginx/sites-available/synaacc.cloud
# Enable: ln -sf /etc/nginx/sites-available/synaacc.cloud /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d synaacc.cloud -d www.synaacc.cloud
#
# Docker frontend listens on 127.0.0.1:8080 and proxies /api to the backend container.

server {
    listen 80;
    listen [::]:80;
    server_name synaacc.cloud www.synaacc.cloud;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
